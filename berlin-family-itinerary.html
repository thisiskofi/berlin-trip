<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Berlin, Day by Day</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root {
    --cream: #FAF6EC;
    --surface: #FFFFFF;
    --ink: #211F1A;
    --muted: #6E6759;
    --line: #E7E0D0;
    --yellow: #F2B705;
    --yellow-deep: #C99200;
    --terracotta: #D9683A;
    --terracotta-deep: #B4502A;
    --teal: #1F6F66;
    --teal-deep: #144E47;
    --sage: #7C9473;
    --danger: #A8462E;

    --font-display: 'Fraunces', Georgia, 'Iowan Old Style', serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'IBM Plex Mono', 'SF Mono', Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }

  .app {
    max-width: 720px;
    margin: 0 auto;
    padding-bottom: 96px;
    min-height: 100vh;
    position: relative;
  }

  /* ---------- Header ---------- */
  .app-header {
    padding: 28px 20px 18px;
    border-bottom: 1px solid var(--line);
  }
  .brand-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--teal-deep);
    text-transform: uppercase;
  }
  .app-header h1 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 32px;
    margin: 4px 0 6px;
    letter-spacing: -0.01em;
  }
  .brand-sub {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
  }
  .sync-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    padding: 4px 10px 4px 8px;
    border-radius: 100px;
    font-size: 11.5px;
    font-family: var(--font-mono);
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--muted);
  }
  .sync-badge .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    flex: 0 0 auto;
  }
  .sync-badge.live .dot { background: var(--teal); }
  .sync-badge.live { color: var(--teal-deep); border-color: #CFE3DF; background: #F0F7F5; }
  .sync-badge.offline .dot { background: var(--terracotta); }
  .sync-badge.offline { color: var(--terracotta-deep); border-color: #F0DCC9; background: #FBF1E6; }
  .sync-badge.local .dot { background: var(--yellow-deep); }
  .sync-badge.local { color: var(--yellow-deep); border-color: #F0DFA6; background: #FCF6E0; }

  /* ---------- Transit line strip (signature element) ---------- */
  .line-strip-wrapper {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
  }
  .line-strip-wrapper::before,
  .line-strip-wrapper::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 40px;
    pointer-events: none;
    z-index: 1;
    transition: opacity 0.2s;
  }
  .line-strip-wrapper::before {
    left: 0;
    background: linear-gradient(to right, var(--surface), transparent);
    opacity: 0;
  }
  .line-strip-wrapper::after {
    right: 0;
    background: linear-gradient(to left, var(--surface), transparent);
    opacity: 1;
  }
  .line-strip-wrapper.can-scroll-left::before { opacity: 1; }
  .line-strip-wrapper.at-end::after { opacity: 0; }

  .strip-scroll-btn {
    display: none;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--surface);
    cursor: pointer;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: var(--ink);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    transition: opacity 0.2s;
  }
  .strip-scroll-btn:hover { background: var(--cream); }
  .strip-scroll-btn.left { left: 4px; }
  .strip-scroll-btn.right { right: 4px; }
  @media (hover: hover) {
    .strip-scroll-btn { display: flex; }
    .strip-scroll-btn.left { opacity: 0; pointer-events: none; }
    .strip-scroll-btn.right { opacity: 1; }
    .line-strip-wrapper.can-scroll-left .strip-scroll-btn.left { opacity: 1; pointer-events: auto; }
    .line-strip-wrapper.at-end .strip-scroll-btn.right { opacity: 0; pointer-events: none; }
  }

  .line-strip {
    padding: 18px 0 14px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .line-strip::-webkit-scrollbar { display: none; }

  .line-track {
    position: relative;
    display: flex;
    align-items: flex-end;
    gap: 0;
    padding: 0 20px;
    min-width: max-content;
    height: 64px;
  }
  .line-rail {
    position: absolute;
    left: 20px;
    right: 20px;
    top: 22px;
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(
      to right,
      var(--terracotta) 0%,
      var(--terracotta) var(--rail-split-a),
      var(--yellow) var(--rail-split-a),
      var(--yellow) var(--rail-split-b),
      var(--teal) var(--rail-split-b),
      var(--teal) 100%
    );
  }

  .day-node {
    position: relative;
    width: 38px;
    flex: 0 0 38px;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    font-family: var(--font-mono);
    color: var(--muted);
  }
  .day-node .dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--surface);
    border: 3px solid var(--terracotta);
    margin-top: 13px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .day-node.stay-2 .dot { border-color: var(--teal); }
  .day-node.transition .dot {
    border-radius: 4px;
    transform: rotate(45deg);
    background: var(--yellow);
    border-color: var(--yellow-deep);
  }
  .day-node .num {
    font-size: 10px;
    margin-top: 6px;
    white-space: nowrap;
  }
  .day-node.selected .dot {
    transform: scale(1.35);
    box-shadow: 0 0 0 3px var(--cream), 0 0 0 5px var(--ink);
  }
  .day-node.transition.selected .dot { transform: rotate(45deg) scale(1.35); }
  .day-node.has-items .dot { background: var(--ink); }
  .day-node:focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; border-radius: 4px; }

  /* ---------- Day panel ---------- */
  .day-panel { padding: 20px; }

  .day-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .day-head h2 {
    font-family: var(--font-display);
    font-size: 24px;
    margin: 0;
  }
  .day-counter {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
  }
  .area-badge {
    display: inline-block;
    margin: 6px 0 18px;
    padding: 5px 11px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    background: #FBEFE6;
    color: var(--terracotta-deep);
  }
  .area-badge.stay-2 { background: #E7F1EF; color: var(--teal-deep); }
  .area-badge.transition { background: #FCF3D9; color: var(--yellow-deep); }

  .neighborhood-hero {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 12px;
    display: block;
    margin-bottom: 18px;
    background: var(--line);
  }
  .neighborhood-hero-split {
    width: 100%;
    height: 180px;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    margin-bottom: 18px;
    position: relative;
  }
  .neighborhood-hero-split img {
    width: 50%;
    height: 100%;
    object-fit: cover;
    flex: 0 0 50%;
  }
  .neighborhood-hero-split::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 3px;
    transform: translateX(-50%);
    background: var(--surface);
    box-shadow: 0 0 8px rgba(0,0,0,0.25);
  }

  .empty-state {
    border: 1px dashed var(--line);
    border-radius: 12px;
    padding: 28px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 16px;
  }

  .agenda-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }

  .item-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px;
  }
  .item-row { display: flex; gap: 12px; align-items: flex-start; }
  .item-time {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--ink);
    min-width: 50px;
    padding-top: 2px;
  }
  .item-time.flex { color: var(--muted); }
  .item-tag {
    flex: 0 0 4px;
    align-self: stretch;
    border-radius: 4px;
    background: var(--terracotta);
  }
  .item-tag.family { background: var(--sage); }
  .item-tag.custom { background: var(--ink); }
  .item-body { flex: 1; min-width: 0; }
  .item-title { font-weight: 600; font-size: 15px; margin: 0 0 2px; }
  .item-notes { font-size: 13px; color: var(--muted); margin: 0; white-space: pre-wrap; }
  .item-booking {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 6px;
    font-family: var(--font-mono);
    font-size: 11.5px;
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 3px 7px;
    color: var(--muted);
  }
  .item-actions { display: flex; gap: 6px; flex: 0 0 auto; }
  .icon-btn {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-btn:hover { background: var(--cream); color: var(--ink); }
  .icon-btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  .edit-form {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  label.field-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 3px;
    display: block;
  }
  input[type="text"], input[type="time"], textarea {
    width: 100%;
    font-family: var(--font-body);
    font-size: 14px;
    padding: 9px 10px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--cream);
    color: var(--ink);
  }
  textarea { resize: vertical; min-height: 54px; }
  input:focus-visible, textarea:focus-visible { outline: 2px solid var(--ink); outline-offset: 1px; }

  .form-row-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

  .btn {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 13px;
    border-radius: 9px;
    padding: 9px 14px;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--cream);
    cursor: pointer;
  }
  .btn:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; }
  .btn.secondary { background: var(--surface); color: var(--ink); border-color: var(--line); }
  .btn.danger { background: var(--surface); color: var(--danger); border-color: var(--danger); }
  .btn.small { padding: 6px 11px; font-size: 12.5px; }

  .add-day-btn {
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    border: 1.5px dashed var(--terracotta);
    background: #FBEFE6;
    color: var(--terracotta-deep);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }
  .add-day-btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  /* ---------- FAB ---------- */
  .fab {
    position: fixed;
    bottom: 22px;
    right: max(22px, calc((100vw - 720px) / 2 + 22px));
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--yellow);
    color: var(--ink);
    border: none;
    font-size: 26px;
    font-weight: 600;
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    cursor: pointer;
    z-index: 20;
  }
  .fab:focus-visible { outline: 3px solid var(--ink); outline-offset: 2px; }

  /* ---------- Modal ---------- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(33,31,26,0.45);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 30;
  }
  .modal-overlay[hidden] { display: none; }
  .modal-sheet {
    background: var(--cream);
    width: 100%;
    max-width: 720px;
    max-height: 86vh;
    border-radius: 18px 18px 0 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  @media (min-width: 560px) {
    .modal-overlay { align-items: center; }
    .modal-sheet { border-radius: 18px; max-height: 80vh; margin: 20px; }
  }

  .modal-head {
    padding: 16px 18px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-head h3 { font-family: var(--font-display); font-size: 20px; margin: 0; }
  .modal-close { background: none; border: none; font-size: 20px; color: var(--muted); cursor: pointer; padding: 4px 8px; }

  .tabs { display: flex; gap: 6px; padding: 14px 18px 0; }
  .tab-btn {
    flex: 1;
    padding: 9px;
    border-radius: 9px;
    border: 1px solid var(--line);
    background: var(--surface);
    font-weight: 600;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
  }
  .tab-btn.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }

  .modal-body { padding: 14px 18px 22px; overflow-y: auto; }

  .area-toggle {
    font-size: 12.5px;
    color: var(--teal-deep);
    background: none;
    border: none;
    text-decoration: underline;
    cursor: pointer;
    padding: 0 0 10px;
    display: block;
  }

  .lib-group-label {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 14px 0 8px;
  }
  .lib-group-label:first-child { margin-top: 0; }

  .lib-item {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 8px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .lib-item .item-tag { width: 4px; flex: 0 0 4px; }
  .lib-item-thumb {
    width: 56px;
    height: 56px;
    flex: 0 0 56px;
    border-radius: 8px;
    object-fit: cover;
    background: var(--line);
  }
  .lib-item-body { flex: 1; min-width: 0; }
  .lib-item-title { font-weight: 600; font-size: 14px; margin: 0 0 3px; }
  .lib-item-blurb { font-size: 12.5px; color: var(--muted); margin: 0; }
  .item-card-img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 8px;
    display: block;
    background: var(--line);
  }
  .lib-item-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }
  .dist-badge {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--muted);
  }
  .item-dist {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--muted);
    margin-top: 2px;
  }
  .lib-section-header {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 700;
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--terracotta-deep);
    margin: 18px 0 8px;
  }
  .lib-section-header:first-child { margin-top: 4px; }
  .lib-section-header-restaurant { color: var(--teal-deep); }
  .lib-empty-note {
    font-size: 12.5px;
    color: var(--muted);
    margin: 4px 0 8px;
    font-style: italic;
  }
  .type-icon {
    display: inline-flex;
    align-items: center;
    vertical-align: middle;
    margin-right: 5px;
    color: var(--terracotta-deep);
    flex-shrink: 0;
  }
  .type-icon-restaurant { color: var(--teal-deep); }
  .item-type-icon {
    display: inline-flex;
    align-items: center;
    vertical-align: middle;
    margin-right: 4px;
    color: var(--terracotta-deep);
  }
  .item-type-icon.restaurant { color: var(--teal-deep); }
  .lib-item-actions {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
  }
  .lib-del-btn {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: none;
    cursor: pointer;
    font-size: 10px;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .lib-del-btn:hover { background: #fee; color: var(--danger); border-color: var(--danger); }
  .lib-restore-note {
    font-size: 12px;
    color: var(--muted);
    margin: 14px 0 0;
    text-align: center;
  }
  .lib-restore-btn {
    background: none;
    border: none;
    color: var(--teal-deep);
    text-decoration: underline;
    cursor: pointer;
    font-size: 12px;
    padding: 0;
    font-family: var(--font-body);
  }
  .lib-add-new-wrap {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }
  .lib-add-new-btn {
    background: none;
    border: 1px dashed var(--line);
    border-radius: 10px;
    width: 100%;
    padding: 10px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--font-body);
  }
  .lib-add-new-btn:hover { border-color: var(--ink); color: var(--ink); }
  .lib-new-form {
    margin-top: 12px;
    padding: 14px;
    background: var(--cream);
    border-radius: 12px;
    border: 1px solid var(--line);
  }
  .lib-new-form-row {
    display: flex;
    gap: 16px;
  }
  .lib-new-form-row > div { flex: 1; }
  .lib-new-toggle {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .lib-new-toggle-btn {
    padding: 4px 10px;
    border-radius: 100px;
    border: 1px solid var(--line);
    background: var(--surface);
    font-size: 12px;
    cursor: pointer;
    font-family: var(--font-body);
    color: var(--ink);
  }
  .lib-new-toggle-btn.active {
    background: var(--ink);
    color: var(--surface);
    border-color: var(--ink);
  }
  .lib-added-badge {
    font-size: 10.5px;
    font-family: var(--font-mono);
    color: var(--teal-deep);
    margin-top: 5px;
    display: inline-block;
  }
  .lib-add-btn {
    flex: 0 0 auto;
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1px solid var(--ink);
    background: var(--surface);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .lib-add-btn:hover { background: var(--ink); color: var(--cream); }

  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--cream);
    padding: 9px 16px;
    border-radius: 100px;
    font-size: 13px;
    z-index: 40;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .toast.show { opacity: 1; }

  .footer-note {
    padding: 4px 20px 26px;
    font-size: 11.5px;
    color: var(--muted);
    text-align: center;
  }
  .footer-note button {
    background: none; border: none; color: var(--danger);
    text-decoration: underline; cursor: pointer; font-size: 11.5px;
  }
</style>
</head>
<body>

<div class="app">
  <header class="app-header">
    <div class="brand-eyebrow">Family trip</div>
    <h1>Berlin, Day by Day</h1>
    <p class="brand-sub">Jul 11 – Aug 7 · Schöneberg, then Mitte / Prenzlauer Berg</p>
    <div class="sync-badge" id="syncBadge"><span class="dot"></span><span id="syncBadgeText">Starting up…</span></div>
  </header>

  <div class="line-strip-wrapper" id="lineStripWrapper">

  var LOCAL_KEY = "berlin-itinerary-data";

  function setSyncBadge(mode, text) {

  function loadData() {
    return new Promise(function (resolve) {
      var resolved = false;
      function finish() {
        if (resolved) return;
        resolved = true;
        state.loaded = true;

      html += '<textarea id="notes-' + item.id + '">' + escapeHtml(item.notes || "") + "</textarea></div>";
      html += '<div><label class="field-label" for="booking-' + item.id + '">Booking confirmation</label>';
      html += '<input type="text" id="booking-' + item.id + '" value="' + escapeAttr(item.booking || "") + '" placeholder="e.g. confirmation code" /></div>';
      html += '<div class="form-row-actions">';
      html += '<button class="btn secondary small" id="cancel-' + item.id + '">Cancel</button>';
      html += '<button class="btn small" id="save-' + item.id + '">Save</button>';
      html += "</div></div>";
    }
    html += "</div>";
    return html;
  }

  function toggleEdit(itemId) {
    state.editingItemId = state.editingItemId === itemId ? null : itemId;
    renderDayPanel();
  }

  function wireEditForm(item) {
    var saveBtn = document.getElementById("save-" + item.id);
    var cancelBtn = document.getElementById("cancel-" + item.id);
    if (cancelBtn) cancelBtn.addEventListener("click", function () { state.editingItemId = null; renderDayPanel(); });
    if (saveBtn) saveBtn.addEventListener("click", function () {
      var titleEl = document.getElementById("title-" + item.id);
      var timeEl = document.getElementById("time-" + item.id);
      var notesEl = document.getElementById("notes-" + item.id);
      var bookingEl = document.getElementById("booking-" + item.id);

      var dayItems = getDayItems(state.selectedDate);
      var target = dayItems.find(function (it) { return it.id === item.id; });
      if (target) {
        if (target.category === "custom" && titleEl) target.title = titleEl.value.trim() || target.title;
        target.time = timeEl.value || "";
        target.notes = notesEl.value.trim();
        target.booking = bookingEl.value.trim();
      }
      state.editingItemId = null;
      saveData().then(function () { renderDayPanel(); });
    });
  }

  function deleteItem(itemId) {
    var dayItems = getDayItems(state.selectedDate);
    state.data.agenda[state.selectedDate] = dayItems.filter(function (it) { return it.id !== itemId; });
    saveData().then(function () {
      renderDayPanel();
      showToast("Removed");
    });
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }
  function escapeAttr(str) { return escapeHtml(str); }

  function selectDate(dt) {
    state.selectedDate = dt;
    state.editingItemId = null;
    renderDayPanel();
    scrollSelectedIntoView();
  }

  /* ---------------- Modal ---------------- */
  var modalOverlay = document.getElementById("modalOverlay");
  var modalBody = document.getElementById("modalBody");
  var modalTitle = document.getElementById("modalTitle");
  var tabLibraryBtn = document.getElementById("tabLibraryBtn");
  var tabCustomBtn = document.getElementById("tabCustomBtn");

  function openModal(tab) {
    state.modalTab = tab || "library";
    modalOverlay.hidden = false;
    renderModal();
  }
  function closeModal() { modalOverlay.hidden = true; }

  document.getElementById("fabBtn").addEventListener("click", function () { openModal("library"); });
  document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
  modalOverlay.addEventListener("click", function (e) { if (e.target === modalOverlay) closeModal(); });
  tabLibraryBtn.addEventListener("click", function () { state.modalTab = "library"; renderModal(); });
  tabCustomBtn.addEventListener("click", function () { state.modalTab = "custom"; renderModal(); });

  function renderModal() {
    tabLibraryBtn.classList.toggle("active", state.modalTab === "library");
    tabCustomBtn.classList.toggle("active", state.modalTab === "custom");
    modalTitle.textContent = "Add to " + new Date(state.selectedDate + "T12:00:00").toLocaleDateString(undefined, { month: "short", day: "numeric" });

    if (state.modalTab === "library") renderLibraryTab();
    else renderCustomTab();
  }

  function renderLibItem(a, addedIds, customIds) {
    var added = addedIds.indexOf(a.id) >= 0;
    var isCustom = customIds.indexOf(a.id) >= 0;
    var canDelete = true;
    var isRestaurant = a.type === "restaurant";
    var tagClass = a.category === "family" ? "family" : a.category === "custom" ? "custom" : "";
    var html = '<div class="lib-item">';
    html += '<div class="item-tag ' + tagClass + '"></div>';
    if (a.img) html += '<img class="lib-item-thumb" src="' + a.img + '" alt="" loading="lazy">';
    html += '<div class="lib-item-body">';
    html += '<p class="lib-item-title">';
    html += '<span class="type-icon ' + (isRestaurant ? "type-icon-restaurant" : "type-icon-activity") + '">' + (isRestaurant ? ICON_RESTAURANT : ICON_ACTIVITY) + '</span>';
    html += escapeHtml(a.title) + "</p>";
    if (a.blurb) html += '<p class="lib-item-blurb">' + escapeHtml(a.blurb) + "</p>";
    html += '<div class="lib-item-meta">';
    if (a.km) html += '<span class="dist-badge">📍 ' + a.km + ' km away</span>';
    if (added) html += '<span class="lib-added-badge">✓ Already on this day</span>';
    html += '</div></div>';
    html += '<div class="lib-item-actions">';
    html += '<button class="lib-add-btn" id="add-' + a.id + '" aria-label="Add ' + escapeAttr(a.title) + '">+</button>';
    html += '<button class="lib-del-btn" id="libdel-' + a.id + '" aria-label="Remove from list">✕</button>';
    html += '</div></div>';
    return html;
  }

  function renderLibraryTab() {
    var stay = getStay(state.selectedDate);
    var relevantStay = stay === "transition" ? null : stay;
    var allLib = getAllLibItems();
    var pool = state.libraryShowAll || !relevantStay
      ? allLib
      : allLib.filter(function (a) { return !a.stay || a.stay === relevantStay; });

    var dayItems = getDayItems(state.selectedDate);
    var addedIds = dayItems.map(function (it) { return it.libId; }).filter(Boolean);
    var customIds = getCustomLibItems().map(function (a) { return a.id; });

    var html = "";
    if (relevantStay) {
      html += '<button class="area-toggle" id="areaToggleBtn">' +
        (state.libraryShowAll ? "Showing all — filter to this stay" : "Showing " + getAreaLabel(state.selectedDate) + " only — show all") +
        "</button>";
    }

    // Activities section
    var activities = pool.filter(function (a) { return a.type !== "restaurant"; });
    if (activities.length) {
      html += '<div class="lib-section-header">' + ICON_ACTIVITY + ' Activities</div>';
      ["kids", "family", "custom"].forEach(function (cat) {
        var group = activities.filter(function (a) { return a.category === cat; });
        if (!group.length) return;
        var label = cat === "kids" ? "Kids-only" : cat === "family" ? "Full family" : "Your additions";
        html += '<div class="lib-group-label">' + label + "</div>";
        group.forEach(function (a) { html += renderLibItem(a, addedIds, customIds); });
      });
    }

    // Restaurants section
    var restaurants = pool.filter(function (a) { return a.type === "restaurant"; });
    html += '<div class="lib-section-header lib-section-header-restaurant">' + ICON_RESTAURANT + ' Restaurants</div>';
    if (restaurants.length) {
      // Group: built-in (none yet) vs custom
      var builtInR = restaurants.filter(function (a) { return customIds.indexOf(a.id) < 0; });
      var customR = restaurants.filter(function (a) { return customIds.indexOf(a.id) >= 0; });
      builtInR.forEach(function (a) { html += renderLibItem(a, addedIds, customIds); });
      if (customR.length) {
        if (builtInR.length) html += '<div class="lib-group-label">Your additions</div>';
        customR.forEach(function (a) { html += renderLibItem(a, addedIds, customIds); });
      }
    } else {
      html += '<p class="lib-empty-note">No restaurants added yet — use the form below.</p>';
    }

    html += '<div class="lib-add-new-wrap">';
    html += '<button class="lib-add-new-btn" id="showAddToListBtn">+ Add to list</button>';
    html += '</div>';
    html += '<div class="lib-new-form" id="libNewForm" hidden>';
    html += '<div class="lib-new-form-row" style="margin-bottom:8px;">';
    html += '<div><label class="field-label">Type</label>';
    html += '<div class="lib-new-toggle" id="newLibTypeToggle">';
    html += '<button class="lib-new-toggle-btn active" data-val="activity">' + ICON_ACTIVITY + ' Activity</button>';
    html += '<button class="lib-new-toggle-btn" data-val="restaurant">' + ICON_RESTAURANT + ' Restaurant</button>';
    html += '</div></div></div>';
    html += '<div><label class="field-label" for="newLibTitle">Name</label>';
    html += '<input type="text" id="newLibTitle" placeholder="e.g. Café Einstein" /></div>';
    html += '<div style="margin-top:8px;"><label class="field-label" for="newLibBlurb">Notes (optional)</label>';
    html += '<input type="text" id="newLibBlurb" placeholder="e.g. Great brunch, book ahead" /></div>';
    html += '<div id="newLibCatRow" style="margin-top:8px;" class="lib-new-form-row">';
    html += '<div><label class="field-label">Category</label>';
    html += '<div class="lib-new-toggle" id="newLibCatToggle">';
    html += '<button class="lib-new-toggle-btn active" data-val="family">Family</button>';
    html += '<button class="lib-new-toggle-btn" data-val="kids">Kids-only</button>';
    html += '</div></div>';
    html += '<div><label class="field-label">Stay</label>';
    html += '<div class="lib-new-toggle" id="newLibStayToggle">';
    html += '<button class="lib-new-toggle-btn active" data-val="0">Both</button>';
    html += '<button class="lib-new-toggle-btn" data-val="1">Schöneberg</button>';
    html += '<button class="lib-new-toggle-btn" data-val="2">Mitte</button>';
    html += '</div></div></div>';
    html += '<div id="newLibStayRowRestaurant" style="margin-top:8px; display:none;">';
    html += '<label class="field-label">Stay</label>';
    html += '<div class="lib-new-toggle" id="newLibStayToggleR">';
    html += '<button class="lib-new-toggle-btn active" data-val="0">Both</button>';
    html += '<button class="lib-new-toggle-btn" data-val="1">Schöneberg</button>';
    html += '<button class="lib-new-toggle-btn" data-val="2">Mitte</button>';
    html += '</div></div>';
    html += '<button class="btn" id="saveToListBtn" style="margin-top:12px;">Save to list</button>';
    html += '</div>';

    var hiddenIds = getHiddenIds();
    if (hiddenIds.length) {
      html += '<p class="lib-restore-note">' + hiddenIds.length + ' built-in item' + (hiddenIds.length > 1 ? 's' : '') + ' hidden. <button class="lib-restore-btn" id="restoreHiddenBtn">Restore all</button></p>';
    }

    modalBody.innerHTML = html;

    var restoreBtn = document.getElementById("restoreHiddenBtn");
    if (restoreBtn) restoreBtn.addEventListener("click", function () {
      state.data.hiddenActivities = [];
      saveData().then(function () { renderLibraryTab(); });
    });

    var toggleBtn = document.getElementById("areaToggleBtn");
    if (toggleBtn) toggleBtn.addEventListener("click", function () {
      state.libraryShowAll = !state.libraryShowAll;
      renderLibraryTab();
    });

    pool.forEach(function (a) {
      var btn = document.getElementById("add-" + a.id);
      if (btn) btn.addEventListener("click", function () { addLibraryItem(a); });
      var delBtn = document.getElementById("libdel-" + a.id);
      if (delBtn) delBtn.addEventListener("click", function () { removeLibItem(a.id); });
    });

    document.getElementById("showAddToListBtn").addEventListener("click", function () {
      document.getElementById("libNewForm").hidden = false;
      this.hidden = true;
      document.getElementById("newLibTitle").focus();
    });

    // Type toggle shows/hides category row
    var typeToggle = document.getElementById("newLibTypeToggle");
    var catRow = document.getElementById("newLibCatRow");
    var stayRowR = document.getElementById("newLibStayRowRestaurant");
    typeToggle.addEventListener("click", function (e) {
      var btn = e.target.closest(".lib-new-toggle-btn");
      if (!btn) return;
      typeToggle.querySelectorAll(".lib-new-toggle-btn").forEach(function (b) { b.classList.remove("active"); });
      btn.classList.add("active");
      var isR = btn.dataset.val === "restaurant";
      catRow.style.display = isR ? "none" : "";
      stayRowR.style.display = isR ? "" : "none";
    });

    ["newLibCatToggle", "newLibStayToggle", "newLibStayToggleR"].forEach(function (groupId) {
      var grp = document.getElementById(groupId);
      if (!grp) return;
      grp.addEventListener("click", function (e) {
        var btn = e.target.closest(".lib-new-toggle-btn");
        if (!btn) return;
        grp.querySelectorAll(".lib-new-toggle-btn").forEach(function (b) { b.classList.remove("active"); });
        btn.classList.add("active");
      });
    });

    document.getElementById("saveToListBtn").addEventListener("click", function () {
      var titleEl = document.getElementById("newLibTitle");
      var title = titleEl.value.trim();
      if (!title) { titleEl.focus(); showToast("Give it a name first"); return; }
      var blurb = document.getElementById("newLibBlurb").value.trim();
      var typeBtn = document.querySelector("#newLibTypeToggle .lib-new-toggle-btn.active");
      var type = typeBtn ? typeBtn.dataset.val : "activity";
      var isRestaurant = type === "restaurant";
      var cat = isRestaurant ? "custom" : (document.querySelector("#newLibCatToggle .lib-new-toggle-btn.active") || {}).dataset.val || "family";
      var stayToggleId = isRestaurant ? "#newLibStayToggleR" : "#newLibStayToggle";
      var stayBtn = document.querySelector(stayToggleId + " .lib-new-toggle-btn.active");
      var stayVal = stayBtn ? parseInt(stayBtn.dataset.val) : 0;
      var newItem = { id: genId(), type: type, category: cat, stay: stayVal || null, title: title, blurb: blurb };
      if (!state.data.customActivities) state.data.customActivities = [];
      state.data.customActivities.push(newItem);
      saveData().then(function () { renderLibraryTab(); showToast("Added to list"); });
    });
  }

  function removeLibItem(id) {
    var isBuiltIn = ACTIVITIES.some(function (a) { return a.id === id; });
    if (isBuiltIn) {
      if (!state.data.hiddenActivities) state.data.hiddenActivities = [];
      if (state.data.hiddenActivities.indexOf(id) < 0) state.data.hiddenActivities.push(id);
    } else {
      state.data.customActivities = (state.data.customActivities || []).filter(function (a) { return a.id !== id; });
    }
    saveData().then(function () { renderLibraryTab(); });
  }

  function addLibraryItem(activity) {
    var dt = state.selectedDate;
    if (!state.data.agenda[dt]) state.data.agenda[dt] = [];
    state.data.agenda[dt].push({
      id: genId(),
      title: activity.title,
      category: activity.category,
      libId: activity.id,
      time: "",
      notes: "",
      booking: ""
    });
    saveData().then(function () {
      renderDayPanel();
      renderLibraryTab();
      showToast("Added to " + fullDateLabel(dt));
    });
  }

  function renderCustomTab() {
    var html = "";
    html += '<div><label class="field-label" for="customTitle">Title</label>';
    html += '<input type="text" id="customTitle" placeholder="e.g. Dinner at Curry 36" /></div>';
    html += '<div style="margin-top:10px;"><label class="field-label" for="customTime">Time</label>';
    html += '<input type="time" id="customTime" /></div>';
    html += '<div style="margin-top:10px;"><label class="field-label" for="customNotes">Notes</label>';
    html += '<textarea id="customNotes" placeholder="Anything worth remembering"></textarea></div>';
    html += '<div style="margin-top:10px;"><label class="field-label" for="customBooking">Booking confirmation</label>';
    html += '<input type="text" id="customBooking" placeholder="Optional" /></div>';
    html += '<div class="form-row-actions" style="margin-top:14px;">';
    html += '<button class="btn" id="customAddBtn">Add to this day</button></div>';
    modalBody.innerHTML = html;

    document.getElementById("customAddBtn").addEventListener("click", function () {
      var titleEl = document.getElementById("customTitle");
      var title = titleEl.value.trim();
      if (!title) { titleEl.focus(); showToast("Give it a title first"); return; }
      var dt = state.selectedDate;
      if (!state.data.agenda[dt]) state.data.agenda[dt] = [];
      state.data.agenda[dt].push({
        id: genId(),
        title: title,
        category: "custom",
        libId: null,
        time: document.getElementById("customTime").value || "",
        notes: document.getElementById("customNotes").value.trim(),
        booking: document.getElementById("customBooking").value.trim()
      });
      saveData().then(function () {
        renderDayPanel();
        closeModal();
        showToast("Added to " + fullDateLabel(dt));
      });
    });
  }

  /* ---------------- Reset ---------------- */
  function wireFooter() {
    var footer = document.createElement("div");
    footer.className = "footer-note";
    footer.innerHTML = "<button id=\"resetBtn\">Clear all trip data</button> &nbsp;·&nbsp; clears for both devices when sync is on";
    document.querySelector(".app").appendChild(footer);
    document.getElementById("resetBtn").addEventListener("click", function () {
      if (confirm("Clear every activity from every day? This can't be undone.")) {
        state.data = { agenda: {} };
        saveData().then(function () { renderDayPanel(); showToast("Cleared"); });
      }
    });
  }

  /* ---------------- Init ---------------- */
  function init() {
    buildLineStrip();
    wireFooter();
    dayPanel.innerHTML = '<div class="empty-state">Loading your itinerary…</div>';
    loadData().then(function () {
      renderDayPanel();
      scrollSelectedIntoView();
    });
  }

  init();
})();
</script>
</body>
</html>
